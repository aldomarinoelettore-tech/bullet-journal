<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Bullet Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
    --text:#1a1a1a;--text2:#666;--text3:#999;
    --border:#e0e0dc;--border2:#ccc;
    --success-bg:#edf7ed;--success:#2e7d32;
    --warning-bg:#fff8e1;--warning:#e65100;
    --danger:#c62828;--danger-bg:#fdecea;
    --radius:10px;--radius-lg:14px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
      --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
      --border:#3a3a3c;--border2:#48484a;
      --success-bg:#1a3a1a;--success:#66bb6a;
      --warning-bg:#3a2a00;--warning:#ffa726;
      --danger:#ef5350;--danger-bg:#3a1a1a;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
  .app{max-width:720px;margin:0 auto;padding:1rem}
  header{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:var(--radius-lg);padding:.75rem 1rem;margin-bottom:1rem;border:0.5px solid var(--border)}
  header h1{font-size:17px;font-weight:600}
  nav{display:flex;gap:4px}
  nav button{padding:7px 13px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
  nav button.active{background:var(--bg2);color:var(--text)}
  nav button:hover{background:var(--bg2)}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;margin-bottom:.75rem}
  input[type=text],input[type=date],textarea,select{
    width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:8px;
    background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none;
  }
  input[type=text]:focus,textarea:focus{border-color:#7F77DD}
  button.primary{padding:7px 16px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
  button.primary:hover{background:var(--bg2)}
  button.danger{border-color:var(--danger);color:var(--danger)}
  button.icon-btn{border:none;background:transparent;cursor:pointer;color:var(--text3);padding:3px;font-size:18px;line-height:1}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .project-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;transition:transform .15s}
  .project-card:hover{transform:translateY(-2px)}
  .progress-bar{height:5px;border-radius:5px;background:var(--bg3);margin:8px 0 4px}
  .progress-fill{height:5px;border-radius:5px;transition:width .3s}
  .badge{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
  .badge.active{background:var(--success-bg);color:var(--success)}
  .badge.paused{background:var(--warning-bg);color:var(--warning)}
  .badge.done{background:var(--bg2);color:var(--text2)}
  .entry-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
  .sym{font-size:17px;cursor:pointer;width:22px;text-align:center;user-select:none;flex-shrink:0}
  .sym-label{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 6px;border-radius:4px;flex-shrink:0}
  .add-row{display:flex;gap:6px;margin-top:10px}
  .add-row input{flex:1}
  .color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2.5px solid transparent}
  .color-dot.sel{border-color:var(--text)}
  .status-btn{padding:4px 10px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text)}
  .status-btn.active-btn{background:var(--bg2);border-color:var(--border2)}
  .loader{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
  .back-btn{display:flex;align-items:center;gap:6px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;padding:0;margin-bottom:1rem}
  .hint{font-size:11px;color:var(--text3);margin-top:8px}
  .empty{color:var(--text3);font-size:13px;padding:.5rem 0}
  @media(max-width:500px){.grid-2{grid-template-columns:1fr}.projects-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>📓 Mi Bullet Journal</h1>
    <nav>
      <button id="btn-dashboard" class="active" onclick="showView('dashboard')">Tablero</button>
      <button id="btn-daily" onclick="showView('daily')">Daily</button>
      <button id="btn-ideas" onclick="showView('ideas')">Ideas</button>
    </nav>
  </header>
  <div id="view"></div>
</div>

<script>
const SUPABASE_URL = 'https://qwgxhcbzeiijyvxigibh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3Z3hoY2J6ZWlpanl2eGlnaWJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDA4NjEsImV4cCI6MjA5NTQ3Njg2MX0.UznLGDlmkBgSHnKsPMIqL5Xi9CJl60Hl6AuQM8-ghns';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = ['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#BA7517','#639922','#985F99'];
const SYMS = ['•','○','✗','→','✓'];
const SYM_LABEL = {'•':'Tarea','○':'Evento','✗':'Cancelada','→':'Migrada','✓':'Completada'};

let currentView = 'dashboard';
let currentProjectId = null;
let selDate = today();

function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}); }
function el(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showView(v){
  currentView = v;
  ['dashboard','daily','ideas'].forEach(x=>{
    el('btn-'+x).classList.toggle('active', x===v);
  });
  render();
}

async function render(){
  const view = el('view');
  view.innerHTML = '<div class="loader">Cargando...</div>';
  if(currentView==='dashboard') await renderDashboard();
  else if(currentView==='daily') await renderDaily();
  else if(currentView==='ideas') await renderIdeas();
  else if(currentView==='project') await renderProject();
}

// ─── DASHBOARD ───────────────────────────────────────────
async function renderDashboard(){
  const {data:projects} = await sb.from('projects').select('*').order('created_at');
  const {data:tasks} = await sb.from('tasks').select('*');

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:13px;color:var(--text2)">Proyectos activos: ${(projects||[]).filter(p=>p.status==='active').length}</span>
      <button class="primary" onclick="showNewProjectForm()">+ Nuevo proyecto</button>
    </div>
    <div id="new-project-form" style="display:none;margin-bottom:1rem"></div>
    <div class="projects-grid">`;

  for(const p of (projects||[])){
    const ptasks = (tasks||[]).filter(t=>t.project_id===p.id);
    const done = ptasks.filter(t=>t.done).length;
    const pct = ptasks.length ? Math.round(done/ptasks.length*100) : 0;
    html += `
      <div class="project-card" style="border-top:3px solid ${COLORS[p.color||0]}" onclick="openProject('${p.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <span style="font-weight:600;font-size:15px">${esc(p.name)}</span>
          <span class="badge ${p.status}">${p.status==='active'?'Activo':p.status==='paused'?'Pausa':'Listo'}</span>
        </div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:.75rem;line-height:1.4">${esc(p.description||'')}</p>
        <div class="progress-bar"><div class="progress-fill" style="background:${COLORS[p.color||0]};width:${pct}%"></div></div>
        <span style="font-size:12px;color:var(--text2)">${done}/${ptasks.length} tareas · ${pct}%</span>
        ${p.deadline?`<div style="font-size:11px;color:var(--text3);margin-top:4px">📅 ${p.deadline}</div>`:''}
      </div>`;
  }

  if(!(projects||[]).length) html += `<p class="empty" style="grid-column:1/-1;text-align:center;padding:2rem">No hay proyectos. ¡Creá el primero!</p>`;
  html += `</div>`;
  el('view').innerHTML = html;
}

function showNewProjectForm(){
  const f = el('new-project-form');
  if(f.style.display==='block'){f.style.display='none';return;}
  let selColor = 0;
  f.style.display = 'block';
  f.innerHTML = `
    <div class="card">
      <p class="section-title">NUEVO PROYECTO</p>
      <input type="text" id="np-name" placeholder="Nombre del proyecto" style="margin-bottom:8px"/>
      <input type="text" id="np-desc" placeholder="Descripción breve" style="margin-bottom:8px"/>
      <input type="date" id="np-deadline" style="margin-bottom:10px"/>
      <div style="display:flex;gap:6px;margin-bottom:12px" id="color-picker">
        ${COLORS.map((c,i)=>`<div class="color-dot${i===0?' sel':''}" style="background:${c}" onclick="pickColor(${i})"></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <button class="primary" onclick="createProject()">Crear</button>
        <button class="primary" onclick="el('new-project-form').style.display='none'">Cancelar</button>
      </div>
    </div>`;
  window._selColor = 0;
}

window.pickColor = function(i){
  window._selColor = i;
  document.querySelectorAll('.color-dot').forEach((d,j)=>d.classList.toggle('sel',j===i));
};

window.createProject = async function(){
  const name = el('np-name').value.trim();
  if(!name) return;
  await sb.from('projects').insert({
    name,
    description: el('np-desc').value.trim(),
    deadline: el('np-deadline').value||null,
    color: window._selColor||0,
    status:'active'
  });
  showView('dashboard');
};

window.openProject = function(id){
  currentProjectId = id;
  currentView = 'project';
  render();
};

// ─── PROJECT DETAIL ───────────────────────────────────────
async function renderProject(){
  const {data:p} = await sb.from('projects').select('*').eq('id',currentProjectId).single();
  const {data:tasks} = await sb.from('tasks').select('*').eq('project_id',currentProjectId).order('created_at');
  if(!p){showView('dashboard');return;}
  const done = (tasks||[]).filter(t=>t.done).length;
  const pct = (tasks||[]).length ? Math.round(done/(tasks||[]).length*100) : 0;

  el('view').innerHTML = `
    <button class="back-btn" onclick="showView('dashboard')">← Volver al tablero</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
      <div style="width:12px;height:12px;border-radius:50%;background:${COLORS[p.color||0]};flex-shrink:0"></div>
      <span style="font-weight:600;font-size:18px">${esc(p.name)}</span>
      <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
        <button class="status-btn${p.status==='active'?' active-btn':''}" onclick="setStatus('active')">Activo</button>
        <button class="status-btn${p.status==='paused'?' active-btn':''}" onclick="setStatus('paused')">Pausa</button>
        <button class="status-btn${p.status==='done'?' active-btn':''}" onclick="setStatus('done')">Listo</button>
        <button class="primary danger" onclick="deleteProject()">Eliminar</button>
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:12px">
      <div class="card">
        <p class="section-title">TAREAS</p>
        <div id="task-list">
          ${(tasks||[]).map(t=>`
            <div class="entry-row" id="task-${t.id}">
              <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)" style="accent-color:${COLORS[p.color||0]};flex-shrink:0"/>
              <span style="flex:1;font-size:13px;${t.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(t.text)}</span>
              ${t.date?`<span style="font-size:11px;color:var(--text3);flex-shrink:0">${toDisplayDate(t.date)}</span>`:''}
              <button class="icon-btn" onclick="deleteTask('${t.id}')">×</button>
            </div>`).join('')}
          ${!(tasks||[]).length?'<p class="empty">Sin tareas aún.</p>':''}
        </div>
        <div class="add-row">
          <input type="text" id="new-task" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addTask()"/>
          <input type="date" id="new-task-date" value="${today()}" style="width:auto;flex-shrink:0"/>
          <button class="primary" onclick="addTask()">+</button>
        </div>
      </div>
      <div class="card" style="display:flex;flex-direction:column">
        <p class="section-title">NOTAS</p>
        <textarea id="notes-area" style="flex:1;min-height:120px;resize:vertical">${esc(p.notes||'')}</textarea>
        <button class="primary" style="margin-top:8px" onclick="saveNotes()">Guardar</button>
      </div>
    </div>
    <div class="card" style="background:var(--bg2)">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px;color:var(--text2)">Progreso general</span>
        <span style="font-size:13px;font-weight:600">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="background:${COLORS[p.color||0]};width:${pct}%"></div></div>
    </div>`;
}

window.toggleTask = async function(id, done){
  await sb.from('tasks').update({done}).eq('id',id);
  render();
};
window.deleteTask = async function(id){
  await sb.from('tasks').delete().eq('id',id);
  render();
};
window.addTask = async function(){
  const inp = el('new-task');
  const date = el('new-task-date').value || today();
  if(!inp.value.trim()) return;
  await sb.from('tasks').insert({project_id:currentProjectId, text:inp.value.trim(), date});
  inp.value='';
  render();
};
window.saveNotes = async function(){
  await sb.from('projects').update({notes:el('notes-area').value}).eq('id',currentProjectId);
  alert('Notas guardadas ✓');
};
window.setStatus = async function(s){
  await sb.from('projects').update({status:s}).eq('id',currentProjectId);
  render();
};
window.deleteProject = async function(){
  if(!confirm('¿Eliminar este proyecto? Se borrarán todas sus tareas.')) return;
  await sb.from('projects').delete().eq('id',currentProjectId);
  showView('dashboard');
};

// ─── DAILY LOG ────────────────────────────────────────────
async function renderDaily(){
  const {data:entries} = await sb.from('daily_entries').select('*').eq('date',selDate).order('created_at');
  const {data:ideas} = await sb.from('ideas').select('*').eq('date',selDate).order('created_at');

  el('view').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
      <input type="date" value="${selDate}" onchange="changeDate(this.value)" style="font-size:13px"/>
      <span style="font-size:14px;color:var(--text2);text-transform:capitalize">${fmtDate(selDate)}</span>
    </div>
    <div class="card" style="margin-bottom:12px">
      <p class="section-title">ENTRADAS</p>
      <div id="entries-list">
        ${(entries||[]).map(e=>`
          <div class="entry-row">
            <select onchange="changeEntrySym('${e.id}',this.value)" style="width:46px;padding:3px 2px;text-align:center;font-size:16px;border:none;background:transparent;cursor:pointer;color:${e.sym==='✓'?'#1D9E75':'var(--text)'}">
              ${SYMS.map(s=>`<option value="${s}" ${s===e.sym?'selected':''}>${s}</option>`).join('')}
            </select>
            <span style="flex:1;font-size:14px;${e.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(e.text)}</span>
            <span class="sym-label">${SYM_LABEL[e.sym]||''}</span>
            <span style="font-size:11px;color:var(--text3);flex-shrink:0">${toDisplayDate(e.date)}</span>
            <button class="icon-btn" onclick="deleteEntry('${e.id}')">×</button>
          </div>`).join('')}
        ${!(entries||[]).length?'<p class="empty">Sin entradas hoy.</p>':''}
      </div>
      <div class="add-row">
        <select id="new-sym" style="width:50px;padding:6px 4px;text-align:center;font-size:16px">
          ${SYMS.map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
        <input type="text" id="new-entry-text" placeholder="Agregar entrada..." onkeydown="if(event.key==='Enter')addEntry()"/>
        <input type="date" id="new-entry-date" value="${selDate}" style="width:auto;flex-shrink:0"/>
        <button class="primary" onclick="addEntry()">+</button>
      </div>
      <p class="hint">• Tarea &nbsp;○ Evento &nbsp;✗ Cancelada &nbsp;→ Migrada &nbsp;✓ Completada — clic en símbolo para completar</p>
    </div>
    <div class="card">
      <p class="section-title">IDEAS RÁPIDAS</p>
      ${(ideas||[]).map(i=>`
        <div class="entry-row">
          <span style="font-size:16px">💡</span>
          <span style="flex:1;font-size:13px">${esc(i.text)}</span>
          <button class="icon-btn" onclick="deleteIdea('${i.id}')">×</button>
        </div>`).join('')}
      ${!(ideas||[]).length?'<p class="empty">Sin ideas hoy.</p>':''}
      <div class="add-row">
        <input type="text" id="new-idea-text" placeholder="Anotar idea rápida..." onkeydown="if(event.key==='Enter')addIdeaDaily()"/>
        <button class="primary" onclick="addIdeaDaily()">+</button>
      </div>
    </div>`;
}

window.changeDate = function(d){ selDate=d; render(); };
window.changeEntrySym = async function(id, sym){
  const done = sym === '✓';
  await sb.from('daily_entries').update({sym, done}).eq('id', id);
  render();
};
window.toggleEntry = async function(id,sym,done){
  await sb.from('daily_entries').update({done:!done, sym:done?'•':'✗'}).eq('id',id);
  render();
};
window.deleteEntry = async function(id){
  await sb.from('daily_entries').delete().eq('id',id);
  render();
};
function toDisplayDate(d){ const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }

window.addEntry = async function(){
  const text = el('new-entry-text').value.trim();
  const sym = el('new-sym').value;
  const date = el('new-entry-date').value || selDate;
  if(!text) return;
  await sb.from('daily_entries').insert({date, sym, text});
  el('new-entry-text').value='';
  render();
};
window.deleteIdea = async function(id){
  await sb.from('ideas').delete().eq('id',id);
  render();
};
window.addIdeaDaily = async function(){
  const text = el('new-idea-text').value.trim();
  if(!text) return;
  await sb.from('ideas').insert({date:selDate,text});
  el('new-idea-text').value='';
  render();
};

// ─── IDEAS BANK ───────────────────────────────────────────
async function renderIdeas(){
  const {data:ideas} = await sb.from('ideas').select('*').order('created_at',{ascending:false});
  const {data:projects} = await sb.from('projects').select('id,name').order('name');

  el('view').innerHTML = `
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Todas las ideas capturadas</p>
    <div class="add-row" style="margin-bottom:1rem">
      <input type="text" id="new-idea-bank" placeholder="Nueva idea..." onkeydown="if(event.key==='Enter')addIdeaBank()"/>
      <button class="primary" onclick="addIdeaBank()">Agregar</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${(ideas||[]).map(i=>`
        <div class="card" style="display:flex;align-items:center;gap:10px">
          <span style="font-size:16px;flex-shrink:0">💡</span>
          <span style="flex:1;font-size:14px">${esc(i.text)}</span>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0">${i.date}</span>
          ${(projects||[]).length?`
            <select style="font-size:12px;max-width:120px;flex-shrink:0" onchange="sendToProject(this,'${esc(i.text)}')">
              <option value="">→ Proyecto</option>
              ${(projects||[]).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
            </select>`:''
          }
          <button class="icon-btn" onclick="deleteIdeaBank('${i.id}')">×</button>
        </div>`).join('')}
      ${!(ideas||[]).length?'<p class="empty" style="text-align:center;padding:2rem">Sin ideas todavía.</p>':''}
    </div>`;
}

window.addIdeaBank = async function(){
  const text = el('new-idea-bank').value.trim();
  if(!text) return;
  await sb.from('ideas').insert({date:today(),text});
  el('new-idea-bank').value='';
  render();
};
window.deleteIdeaBank = async function(id){
  await sb.from('ideas').delete().eq('id',id);
  render();
};
window.sendToProject = async function(sel, idea){
  if(!sel.value) return;
  const {data:p} = await sb.from('projects').select('notes').eq('id',sel.value).single();
  const notes = (p?.notes?p.notes+'\n':'')+idea;
  await sb.from('projects').update({notes}).eq('id',sel.value);
  sel.value='';
  alert('Idea enviada a notas del proyecto ✓');
};

// ─── INIT ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
